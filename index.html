<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Monzo Lattice</title>
    <style>
      /* スクロール・ズーム・文字選択の抑止 (仕様 §5.5) */
      * {
        box-sizing: border-box;
      }
      html,
      body,
      #root {
        height: 100%;
      }
      body {
        margin: 0;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        font-family: system-ui, sans-serif;
        background: #fff;
        color: #222;
      }

      /* 全体レイアウト (仕様 §5.1): ヘッダ上部、横長なら左・縦長なら下に log 周波数直線 */
      .app {
        height: 100%;
        display: grid;
      }
      @media (orientation: landscape) {
        .app {
          grid-template:
            "header header" auto
            "pitch lattice" 1fr / auto 1fr;
        }
        .pitch-line {
          width: 72px;
          height: 100%;
        }
      }
      @media (orientation: portrait) {
        .app {
          grid-template:
            "header" auto
            "lattice" 1fr
            "pitch" auto / 1fr;
        }
        .pitch-line {
          width: 100%;
          height: 72px;
        }
      }

      /* ヘッダ (仕様 §5.2): 同じ高さで横に並べる */
      .header {
        grid-area: header;
        display: flex;
        align-items: stretch;
        gap: 0.5rem;
        padding: 0.4rem 0.6rem;
        border-bottom: 1px solid #ccc;
      }
      .header-item {
        display: flex;
        align-items: center;
        gap: 0.3rem;
      }
      .bean-palette {
        border: 1px dashed #999;
        border-radius: 0.5rem;
        padding: 0 0.6rem;
        font-size: 1.2rem;
      }
      .settings-button {
        margin-left: auto;
        font-size: 1.2rem;
        background: none;
        border: none;
        cursor: pointer;
      }

      /* log 周波数直線 (仕様 §5.3) */
      .pitch-line {
        grid-area: pitch;
        background: #fafafa;
      }
      .pitch-axis {
        stroke: #555;
        stroke-width: 1.5;
      }
      .pitch-tick {
        stroke: #999;
        stroke-width: 1;
      }
      .pitch-tick-label {
        fill: #777;
        font-size: 0.6rem;
      }
      .band-bass {
        fill: rgba(64, 112, 255, 0.25);
      }
      .band-mid {
        fill: rgba(64, 200, 128, 0.25);
      }
      .pitch-f0 {
        stroke: #d33;
        stroke-width: 2;
      }
      .pitch-f0-label {
        fill: #d33;
        font-size: 0.7rem;
        font-weight: bold;
      }

      /* 格子 (仕様 §3) */
      .lattice {
        grid-area: lattice;
        position: relative;
        overflow: hidden;
        display: grid;
        place-items: center;
      }
      .lattice-placeholder {
        color: #999;
      }

      /* 設定画面 (仕様 §5.4) */
      .settings-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.3);
      }
      .settings-panel {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: min(26rem, 100vw);
        background: #fff;
        box-shadow: -2px 0 8px rgba(0, 0, 0, 0.2);
        overflow-y: auto;
        touch-action: pan-y;
        padding: 0.8rem 1.2rem;
      }
      .settings-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .settings-header h2 {
        margin: 0;
      }
      .settings-panel h3 {
        margin: 1rem 0 0.3rem;
        border-bottom: 1px solid #ddd;
        font-size: 0.9rem;
        color: #666;
      }
      .settings-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.6rem;
        padding: 0.2rem 0;
      }
      .settings-row input[type="number"] {
        width: 6.5rem;
      }
      .slider-field {
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .slider-value {
        min-width: 4rem;
        text-align: right;
        font-variant-numeric: tabular-nums;
        font-size: 0.85rem;
        color: #555;
      }
      .settings-footer {
        margin-top: 1.2rem;
        display: flex;
        justify-content: flex-end;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
